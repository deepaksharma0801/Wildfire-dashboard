services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: wildfire-geoai-backend
    environment:
      DATABASE_URL: postgresql://wildfire:wildfire@postgis:5432/wildfire_geoai
      NWS_USER_AGENT: wildfire-geoai/0.1 portfolio-demo
    ports:
      - "8000:8000"
    volumes:
      - ./data:/workspace/data
    depends_on:
      postgis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: wildfire-geoai-frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend

  postgis:
    image: postgis/postgis:16-3.4
    container_name: wildfire-geoai-postgis
    environment:
      POSTGRES_DB: wildfire_geoai
      POSTGRES_USER: wildfire
      POSTGRES_PASSWORD: wildfire
    ports:
      - "5432:5432"
    volumes:
      - wildfire-postgis-data:/var/lib/postgresql/data
      - ./infra/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wildfire -d wildfire_geoai"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  wildfire-postgis-data:
